<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>滑板热榜 — Skate Hot Ranking</title>
    <meta name="description" content="滑板热榜：实时追踪全球滑板资讯，精选每日Top 10热点。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body data-theme="neon">
    <a class="skip-link" href="#feed">跳到资讯列表</a>

    <header class="topbar">
      <div class="topbar__inner">
        <a class="logo" href="#" aria-label="滑板热榜 首页">
          <span class="logo__text">滑板热榜</span>
          <span class="logo__sub">Skate Hot Ranking</span>
        </a>

        <div class="topbar__meta" aria-hidden="true">
          <span class="meta-datetime" id="todayText"></span>
          <span class="meta-time" id="currentTime"></span>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="hero" aria-label="页面介绍">
        <div class="hero__card">
          <h1 class="hero__title">滑板热榜</h1>
          <p class="hero__subtitle">SK8 TOP 10</p>
          <p class="hero__desc">实时追踪全球滑板资讯，精选每日热点</p>
          <p class="hero__update">每1小时自动更新</p>
        </div>
      </section>

      <section class="feed" id="feed" aria-label="滑板热榜 TOP 10 列表">
        <ol class="feed__list" id="feedList"></ol>
      </section>

      <footer class="footer" aria-label="页脚">
        <div class="footer__inner">
          <!-- 机器刻字效果 -->
          <div class="footer__engraved">
            <span class="footer__engravedText">点击按钮换颜色</span>
          </div>

          <!-- 卡槽风格主题选择器 -->
          <div class="footer__right">
            <div class="theme-selector">
              <div class="theme-slot">
                <div class="theme-buttons">
                  <button class="theme-btn" data-theme="oldstyle" title="旧风格">OLDSTYLE</button>
                  <button class="theme-btn" data-theme="neon" title="霓虹主题">NEON</button>
                  <button class="theme-btn" data-theme="cyber" title="赛博主题">CYBER</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="footer__disclaimer">
          榜单内容由AI自动生成，不代表本站观点，请注意辨别内容真伪。
        </div>
      </footer>
    </main>

    <script src="./data.js"></script>
    <script>
      (function () {
        var el = document.getElementById("todayText");
        if (!el) return;
        try {
          var d = new Date();
          var y = d.getFullYear();
          var m = String(d.getMonth() + 1).padStart(2, "0");
          var day = String(d.getDate()).padStart(2, "0");
          el.textContent = y + "." + m + "." + day;
        } catch (_) {}
      })();

      (function () {
        function updateTime() {
          var el = document.getElementById("currentTime");
          if (!el) return;
          try {
            var d = new Date();
            var h = String(d.getHours()).padStart(2, "0");
            var m = String(d.getMinutes()).padStart(2, "0");
            var s = String(d.getSeconds()).padStart(2, "0");
            el.textContent = h + ":" + m + ":" + s;
          } catch (_) {}
        }
        updateTime();
        setInterval(updateTime, 1000);
      })();

      (function () {
        // 主题切换功能
        const themeButtons = document.querySelectorAll('.theme-btn');
        const body = document.body;

        // 初始化：给默认按钮添加active类
        const currentTheme = body.getAttribute('data-theme');
        themeButtons.forEach(button => {
          if (button.getAttribute('data-theme') === currentTheme) {
            button.classList.add('active');
          }
        });

        themeButtons.forEach(button => {
          button.addEventListener('click', function() {
            const theme = this.getAttribute('data-theme');
            body.setAttribute('data-theme', theme);
            
            // 移除所有按钮的活跃状态
            themeButtons.forEach(btn => btn.classList.remove('active'));
            // 添加当前按钮的活跃状态
            this.classList.add('active');
          });
        });

        // 排除摘要为「标题信息不足，无法评估内容。」的条目，不展示在列表中
        var skipSummary = "标题信息不足，无法评估内容。";

        function shouldSkip(item) {
          var s = (item.summary || "").trim();
          return s.indexOf(skipSummary) !== -1;
        }

        function cleanTitle(item) {
          var t = String(item.title || "").trim();
          // 去掉英文日期前缀：February 15, 2026
          t = t.replace(
            /^(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2},\s*\d{4}\s*/i,
            ""
          );
          // 去掉简写日期前缀：Mar.13th - / Mar.13 -
          t = t.replace(/^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Sept|Oct|Nov|Dec)\.?\s*\d{1,2}(st|nd|rd|th)?\s*-\s*/i, "");
          return t || String(item.title || "");
        }

        function normalize(item) {
          var scoreNum = typeof item.score === "number" ? item.score : parseInt(item.score, 10) || 0;
          return {
            title: cleanTitle(item),
            rawTitle: item.title || "",
            link: item.link || "#",
            score: scoreNum,
            summary: item.summary || "",
            image: item.image || "",
          };
        }

        function renderTop10(listId, items) {
          var list = document.getElementById(listId);
          if (!list) return;
          list.innerHTML = "";

          items.forEach(function (item, i) {
            var li = document.createElement("li");
            li.className = "item item--ranked";

            var a = document.createElement("a");
            a.className = "item__link";
            a.href = item.link || "#";
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.setAttribute("aria-label", "打开：" + (item.title || ""));

            var rank = document.createElement("div");
            rank.className = "item__rank";
            rank.textContent = String(i + 1);

            var main = document.createElement("div");
            main.className = "item__main";

            var titleEl = document.createElement("h2");
            titleEl.className = "item__title";
            titleEl.textContent = item.title || "";

            var meta = document.createElement("div");
            meta.className = "item__meta";

            if (item.summary) {
              var summaryEl = document.createElement("span");
              summaryEl.className = "meta__summary";
              summaryEl.textContent = item.summary;
              meta.appendChild(summaryEl);
            }

            // 热度火花效果
            var heatSparks = document.createElement("div");
            heatSparks.className = "item__heat";
            var heatLevel = Math.min(10, Math.round(item.score / 2)); // 转换为1-10个火花
            for (var i = 0; i < heatLevel; i++) {
              var spark = document.createElement("div");
              spark.className = "heat-spark";
              spark.style.animationDelay = (i * 0.1) + "s";
              heatSparks.appendChild(spark);
            }
            meta.appendChild(heatSparks);

            main.appendChild(titleEl);
            main.appendChild(meta);

            a.appendChild(rank);
            a.appendChild(main);
            li.appendChild(a);
            list.appendChild(li);
          });
        }

        var all = [];
        if (typeof newsData !== "undefined" && Array.isArray(newsData)) {
          all = all.concat(newsData);
        }

        var top = all
          .filter(function (x) {
            return x && !shouldSkip(x);
          })
          .map(normalize)
          .sort(function (a, b) {
            return (b.score || 0) - (a.score || 0);
          })
          .slice(0, 10);

        renderTop10("feedList", top);
      })();
    </script>
  </body>
</html>
